schema: use-tdd-plan

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours

rules:
  proposal:
    # ── Change 命名规则 ──
    # 格式: {domain}-{epic_number}-{name}[_frontend]
    #   domain:        user | circle | channel
    #   epic_number:   两位数字，与 EPIC 编号对应（如 01、10、20）
    #   name:          小写英文短横线分隔，描述 change 核心功能
    #   _frontend:     仅前端 change 添加此后缀，后端 change 不加
    #
    # 示例:
    #   后端: user-01-authentication, circle-10-core, channel-20-infrastructure
    #   前端: user-01-authentication-frontend, circle-10-core-frontend
    #
    # 约束:
    #   - 同一 EPIC 的后端和前端 change 必须共享相同的 domain + epic_number + name
    #   - 后端 change 不加后缀，前端 change 必须加 _frontend 后缀
    #   - change 目录名必须与 openspec/changes/ 下的目录名一致
    #   - 创建新 change 前先查阅 change-prd-mapping.yaml 确认 EPIC 编号和名称
    #   - 命名格式: {domain}-{epic_number}-{name}[_frontend]
    #   - 后端 change 不加后缀，前端 change 必须以 _frontend 结尾
    #   - 同一 EPIC 的后端和前端共享 domain、epic_number、name，仅后缀不同
    #   - 创建前查阅 change-prd-mapping.yaml 确认 EPIC 编号
    #   - 更新 change-prd-mapping.yaml 对应字段