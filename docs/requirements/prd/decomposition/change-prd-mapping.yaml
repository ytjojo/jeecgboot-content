# Change 到 PRD 文档映射配置
# 用途：多 Agent 并行生成 PRD 时的精确上下文路由
# 每个 agent 读取此配置，只加载自己负责的 change + 对应 PRD
#
# 命名规范：{domain}-{epic_number}-{name}[_frontend]
# 字段说明：
#   backend_change  — 后端 change 目录名（openspec/changes/ 下）
#   prd             — 后端 PRD 路径（相对于 prd_dir）
#   frontend_change — 前端 change 目录名（带 _frontend 后缀），无则为 null
#   frontend_prd    — 前端 PRD 文件名（相对于 frontend_prd_dir），无则为 null
#   domain          — 业务域（user / circle / channel）
#   epic            — EPIC 编号
#   status          — archived 表示已归档，null 或省略表示活跃

mapping:
  # ── User 域 ──
  - backend_change: user-01-authentication
    prd: user/EPIC-01-user-authentication.md
    frontend_change: user-01-authentication-frontend
    frontend_prd: EPIC-01-user-authentication-frontend-prd.md
    domain: user
    epic: EPIC-01

  - backend_change: user-02-profile-management
    prd: user/EPIC-02-profile-management.md
    frontend_change: user-02-profile-management-frontend
